# Docker Compose orchestration for the full stack:
#   db  -> PostgreSQL (named volume for persistence)
#   backend -> FastAPI API
#   frontend -> React app served by nginx (proxies /api to backend)
#
# Credentials are supplied via the .env file in this directory (see .env.example).
# Nothing sensitive is hardcoded here.

services:
  db:
    image: postgres:16-alpine
    container_name: ioms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: ioms_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
      SEED_DATA: ${SEED_DATA:-true}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # In Docker the frontend talks to the backend via the nginx /api proxy.
        VITE_API_BASE_URL: /api
    container_name: ioms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
