server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster asset delivery.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the backend service (Docker Compose network).
    # On Vercel/Netlify this block is unused because VITE_API_BASE_URL points
    # directly at the live backend URL.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
