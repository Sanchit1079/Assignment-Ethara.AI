# Netlify config (alternative to Vercel).
# Set VITE_API_BASE_URL in Netlify > Site settings > Environment variables
# to your live backend URL, e.g. https://ioms-backend.onrender.com

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
